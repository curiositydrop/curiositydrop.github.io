<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burning Time | BANDtroductions</title>
<link rel="stylesheet" href="style.css?v=8">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-60112G8RH3"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-60112G8RH3');
</script>
</head>

<body class="new-band-profile-page">

<div id="global-header"></div>

<main class="new-band-profile">

<section class="profile-banner-wrap">
<img class="profile-banner-img" src="IMG_9383.jpeg">
<div class="profile-avatar-card">
<img src="IMG_9383.jpeg">
</div>
</section>

<section class="profile-featured-video">
<h2>Featured Release: “Hard to Follow”</h2>
<iframe src="https://www.youtube.com/embed/ChZHLuhqpS8"></iframe>
</section>

<section class="profile-action-card">
<h1>Burning Time</h1>

<div class="profile-action-row">

<!-- LIKE -->
<button class="profile-action like-action" id="like-btn-burning-time">
🤘 Like (<span id="like-count-burning-time">0</span>)
</button>

<!-- VOTE -->
<button class="profile-action vote-action vote-btn">Vote</button>

<!-- SUPPORT -->
<button class="profile-action support-action" onclick="openSupportModal()">
🔥 Support
</button>

<!-- SHARE -->
<button class="profile-action share-action">Share</button>

</div>

</section>

<!-- SUPPORT MODAL -->
<div id="support-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
<div style="background:#111; padding:20px; border-radius:12px; max-width:400px; width:90%; text-align:center;">

<h2>Support Burning Time</h2>
<p>Choose how you'd like to support the band 🤘</p>

<div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">

<a href="#" class="profile-action support-action">💰 Buy Song</a>
<a href="#" class="profile-action support-action">🤝 Donate</a>
<a href="#" class="profile-action support-action">👕 Merch</a>
<a href="#" class="profile-action support-action">🌐 Website</a>

</div>

<button onclick="closeSupportModal()" style="margin-top:15px;">Close</button>

</div>
</div>

<div id="global-footer"></div>

<script src="global.js"></script>

<!-- LIKE SCRIPT -->
<script>
const likeBtn = document.getElementById('like-btn-burning-time');
const likeCountEl = document.getElementById('like-count-burning-time');

const likeKey = 'bandtroductions_like_burning_time';

let liked = localStorage.getItem(likeKey);
let count = parseInt(localStorage.getItem(likeKey + '_count')) || 0;

likeCountEl.textContent = count;

if (liked) {
likeBtn.innerHTML = '🔥 Liked (<span id="like-count-burning-time">'+count+'</span>)';
likeBtn.style.opacity = '0.7';
}

likeBtn.addEventListener('click', () => {
if (!localStorage.getItem(likeKey)) {
localStorage.setItem(likeKey, 'true');
count++;
localStorage.setItem(likeKey + '_count', count);

likeBtn.innerHTML = '🔥 Liked (<span id="like-count-burning-time">'+count+'</span>)';
likeBtn.style.opacity = '0.7';
}
});
</script>

<!-- MODAL SCRIPT -->
<script>
function openSupportModal() {
document.getElementById('support-modal').style.display = 'flex';
}

function closeSupportModal() {
document.getElementById('support-modal').style.display = 'none';
}

window.onclick = function(e) {
const modal = document.getElementById('support-modal');
if (e.target === modal) modal.style.display = 'none';
}
</script>

</body>
</html>
